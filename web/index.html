<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spain Housing Prices</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="titles">
          <h1>Spain Housing Prices</h1>
          <p class="subtitle" id="subtitle">House Price Index by autonomous community · INE</p>
        </div>
        <div class="topbar-right">
          <span class="badge" id="mode-badge" hidden></span>
          <span class="updated" id="updated"></span>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">◐</button>
        </div>
      </header>

      <div class="banner" id="sample-banner" hidden></div>

      <section class="controls" aria-label="Filters">
        <label class="control">
          <span class="control-label">Indicator</span>
          <select id="indicator-select"></select>
        </label>

        <div class="control">
          <span class="control-label">Metric</span>
          <div class="segmented" id="metric-toggle" role="tablist">
            <button type="button" data-metric="level" role="tab" aria-selected="true">Index level</button>
            <button type="button" data-metric="yoy" role="tab" aria-selected="false">Year-on-year %</button>
          </div>
        </div>

        <label class="control control-grow">
          <span class="control-label">
            Quarter · <strong id="period-label"></strong>
          </span>
          <input type="range" id="period-slider" min="0" max="0" value="0" step="1" />
        </label>
      </section>

      <main class="grid">
        <section class="card map-card">
          <div class="card-head">
            <h2 id="map-title">Price by region</h2>
            <p class="hint" id="map-hint">Click a region to filter the time series</p>
          </div>
          <div class="chart" id="map"></div>
        </section>

        <section class="card series-card">
          <div class="card-head">
            <h2 id="series-title">España</h2>
            <button class="clear-btn" id="clear-btn" type="button" hidden>Clear selection ✕</button>
          </div>
          <div class="readout" id="readout"></div>
          <div class="chart" id="series"></div>
        </section>
      </main>

      <footer class="footer">
        <span id="footer-note"></span>
        <span class="sep">·</span>
        <span>Source: <a href="https://www.ine.es/" target="_blank" rel="noopener">INE</a> — Índice de Precios de Vivienda (IPV), base 2015=100. Geometry: es-atlas.</span>
      </footer>
    </div>

    <script src="vendor/echarts.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
