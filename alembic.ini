# Alembic configuration.
# The sqlalchemy.url below is a placeholder: the real URL is injected from the
# environment at runtime (see src/fintracker/migrate.py and migrations/env.py),
# so no credentials live in this file.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = postgresql+psycopg://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
