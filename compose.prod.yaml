# Production overrides for a server that deploys prebuilt images (continuous
# deployment) instead of building locally:
#
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# - `app` runs the image CI publishes to GHCR on every green main build.
# - deploy/deploy.sh (run every 5 minutes by the finrepin-deploy systemd
#   timer) keeps the whole stack current: it fast-forwards the checkout to
#   origin/main, pulls newer images, and re-runs `up -d`, so app updates,
#   Grafana dashboards/provisioning, and compose changes all apply within
#   minutes of a push to main.
# - Loading files explicitly with -f skips compose.override.yaml, so the
#   Postgres port stays internal.
#
# If the GHCR package is private, `sudo docker login ghcr.io` once on the
# server (PAT with read:packages) — as root, because the timer runs as root.

services:
  app:
    image: ghcr.io/prietoamigo/finrepin:latest
    pull_policy: always

  # Same published image as `app`, different command (set in compose.yaml).
  housing:
    image: ghcr.io/prietoamigo/finrepin:latest
    pull_policy: always

# Pin the project network's MTU. The server's egress interface is 1500, but the
# real path to some external hosts (e.g. fred.stlouisfed.org) is smaller, and
# PMTUD doesn't reach NAT'd containers — so a container's TLS handshake succeeds
# but the bulk response read hangs, while the host itself is fine. Advertising a
# smaller MSS via a 1400-byte bridge MTU makes those reads complete. Changing
# this option requires the network to be recreated once: `... down && ... up -d`.
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
