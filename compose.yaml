name: fintracker

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    # 11.6+ is needed for the custom time-picker quick ranges the dashboards
    # define (timepicker.quick_ranges in the dashboard JSON).
    image: grafana/grafana:11.6.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3007:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Land on Market Overview instead of the default home page (which
      # carries the "Welcome to Grafana" banner) and drop the news feed
      # ("Latest from the blog") panel.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/market-overview.json
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      # The Spain Housing dashboard's filled choropleth uses the Business Charts
      # (Apache ECharts) panel; Grafana installs it from the catalog on startup.
      GF_INSTALL_PLUGINS: volkovlabs-echarts-panel
      # Consumed by the provisioned datasource (grafana/provisioning/datasources).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot dump of the whole DB, gzipped into ./backups.
  # Run on demand (or from host cron): docker compose run --rm backup
  backup:
    image: postgres:16
    profiles: ["backup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
    entrypoint:
      - sh
      - -c
      - pg_dump | gzip > "/backups/fintracker-$$(date +%F-%H%M%S).sql.gz"

volumes:
  pgdata:
  grafana-storage:
